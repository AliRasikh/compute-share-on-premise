name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

env:
  DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP}}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy on server
        run: |
          echo "Deploying to $DEPLOY_SERVER_IP..."
          curl -X POST http://${{ env.DEPLOY_SERVER_IP }}:9000/deploy \
            --max-time 10 \
            --retry 2 \
            -o /dev/null -w "HTTP %{http_code}" \
            && echo " - Deploy triggered!"
