# ============================================================================
# Sovereign Compute Engine — Docker Compose Demo Stack
#
# Spins up a complete cluster using HOST NETWORKING:
#   1 Nomad Server (scheduler)        — ports 4646/4647/4648
#   4 Nomad Clients (simulated)       — ports offset by 10/20/30/40
#   1 FastAPI Gateway (dashboard API) — port 8080
#
# Host networking ensures the Nomad server is reachable from both
# Docker-provisioned clients AND external nodes on the internet.
#
# Usage:
#   docker compose up --build
#
# Then:
#   Dashboard:        http://localhost:3000
#   Dashboard API:    http://localhost:8080/docs
#   Nomad UI:         http://localhost:4646/ui
# ============================================================================

services:

  # ── Nomad Server (Control Plane) ──────────────────────────────────────────
  nomad-server:
    build:
      context: ./docker
      dockerfile: Dockerfile.nomad
    container_name: nomad-server
    hostname: nomad-server
    privileged: true
    init: true
    cgroup: host
    network_mode: host
    environment:
      - NOMAD_ROLE=server
      - NODE_NAME=sovereign-server
      - DATACENTER=eu-west
    volumes:
      - nomad-server-data:/opt/nomad/data
      - /sys/fs/cgroup:/sys/fs/cgroup
    healthcheck:
      test: [ "CMD", "nomad", "status" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ── Company 1: Alpha Technologies ─────────────────────────────────────────
  # A mid-size tech company contributing 4 CPU cores, 2GB RAM
  client-alpha:
    build:
      context: ./docker
      dockerfile: Dockerfile.nomad
    container_name: client-alpha
    hostname: alpha-node-01
    privileged: true
    init: true
    cgroup: host
    network_mode: host
    environment:
      - NOMAD_ROLE=client
      - COMPANY_NAME=alpha-technologies
      - NODE_NAME=alpha-node-01
      - NOMAD_SERVER_ADDR=127.0.0.1:4647
      - DATACENTER=eu-west
      - NODE_POOL=shared
      - CPU_TOTAL_COMPUTE=4000
      - MEMORY_TOTAL_MB=2048
      - GPU_TYPE=none
      - GPU_PRESENT=false
      - CLIENT_PORT_OFFSET=10
    volumes:
      - nomad-alpha-data:/opt/nomad/data
      - /sys/fs/cgroup:/sys/fs/cgroup
      - ./demo:/opt/demo:ro
    depends_on:
      nomad-server:
        condition: service_healthy

  # ── Company 2: Beta Systems GmbH ─────────────────────────────────────────
  # A German industrial company with GPU resources, 8 CPU cores, 4GB RAM
  client-beta:
    build:
      context: ./docker
      dockerfile: Dockerfile.nomad
    container_name: client-beta
    hostname: beta-node-01
    privileged: true
    init: true
    cgroup: host
    network_mode: host
    environment:
      - NOMAD_ROLE=client
      - COMPANY_NAME=beta-systems
      - NODE_NAME=beta-node-01
      - NOMAD_SERVER_ADDR=127.0.0.1:4647
      - DATACENTER=eu-west
      - NODE_POOL=shared
      - CPU_TOTAL_COMPUTE=8000
      - MEMORY_TOTAL_MB=4096
      - GPU_TYPE=nvidia-simulation
      - GPU_PRESENT=true
      - CLIENT_PORT_OFFSET=20
    volumes:
      - nomad-beta-data:/opt/nomad/data
      - /sys/fs/cgroup:/sys/fs/cgroup
      - ./demo:/opt/demo:ro
    depends_on:
      nomad-server:
        condition: service_healthy

  # ── Company 3: Gamma Data Solutions ───────────────────────────────────────
  # A data analytics company, 2 CPU cores, 1GB RAM (smaller contribution)
  client-gamma:
    build:
      context: ./docker
      dockerfile: Dockerfile.nomad
    container_name: client-gamma
    hostname: gamma-node-01
    privileged: true
    init: true
    cgroup: host
    network_mode: host
    environment:
      - NOMAD_ROLE=client
      - COMPANY_NAME=gamma-data
      - NODE_NAME=gamma-node-01
      - NOMAD_SERVER_ADDR=127.0.0.1:4647
      - DATACENTER=eu-west
      - NODE_POOL=shared
      - CPU_TOTAL_COMPUTE=2000
      - MEMORY_TOTAL_MB=1024
      - GPU_TYPE=none
      - GPU_PRESENT=false
      - CLIENT_PORT_OFFSET=30
    volumes:
      - nomad-gamma-data:/opt/nomad/data
      - /sys/fs/cgroup:/sys/fs/cgroup
      - ./demo:/opt/demo:ro
    depends_on:
      nomad-server:
        condition: service_healthy

  # ── Company 4: Delta Cloud EU ─────────────────────────────────────────────
  # An EU cloud startup, 6 CPU cores, 3GB RAM
  client-delta:
    build:
      context: ./docker
      dockerfile: Dockerfile.nomad
    container_name: client-delta
    hostname: delta-node-01
    privileged: true
    init: true
    cgroup: host
    network_mode: host
    environment:
      - NOMAD_ROLE=client
      - COMPANY_NAME=delta-cloud-eu
      - NODE_NAME=delta-node-01
      - NOMAD_SERVER_ADDR=127.0.0.1:4647
      - DATACENTER=eu-central
      - NODE_POOL=shared
      - CPU_TOTAL_COMPUTE=6000
      - MEMORY_TOTAL_MB=3072
      - GPU_TYPE=none
      - GPU_PRESENT=false
      - CLIENT_PORT_OFFSET=40
    volumes:
      - nomad-delta-data:/opt/nomad/data
      - /sys/fs/cgroup:/sys/fs/cgroup
      - ./demo:/opt/demo:ro
    depends_on:
      nomad-server:
        condition: service_healthy

  # ── FastAPI Gateway ────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sovereign-api
    hostname: sovereign-api
    network_mode: host
    environment:
      - NOMAD_ADDR=http://127.0.0.1:4646
      - NOMAD_TOKEN=
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8080,http://95.179.248.242:8080,http://95.179.248.242:3000,*
    depends_on:
      nomad-server:
        condition: service_healthy

  # ── Headscale Control Plane ────────────────────────────────────────────────
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    hostname: headscale
    network_mode: host
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/data:/var/lib/headscale
    command: serve
    restart: unless-stopped

  # ── Headscale Auto-Setup ───────────────────────────────────────────────────
  headscale-setup:
    image: docker:latest
    container_name: headscale-setup
    depends_on:
      - headscale
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./headscale/data:/opt/headscale-data
      - ../src/app/dashboard/my-nodes:/opt/frontend
    command: >
      sh -c " echo 'Waiting for Headscale to start...'; sleep 5; docker exec headscale headscale users create cluster-nodes 2>/dev/null || true; ID=$$(docker exec -e NO_COLOR=1 headscale headscale users list | grep "cluster-nodes" | awk '{print $$1}'); echo $$ID; KEY=$$(docker exec headscale headscale preauthkeys create -e 14d --ephemeral --reusable --user $$ID); echo $$KEY > /opt/headscale-data/current_auth_key.txt; sed -i \"s/--headscale-key \\\".*\\\"/--headscale-key \\\"$$KEY\\\"/\" /opt/frontend/page.tsx; echo '=========================================================='; echo ' HEADSCALE AUTO-SETUP COMPLETE'; echo ' Your Worker Node Auth Key is: ' $$KEY; echo '=========================================================='; "
volumes:
  nomad-server-data:
  nomad-alpha-data:
  nomad-beta-data:
  nomad-gamma-data:
  nomad-delta-data:
